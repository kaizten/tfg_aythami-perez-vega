<div class="p-margin bg-background">
  <!-- No data banner -->
  <div *ngIf="!hasData"
       class="mb-xl p-md bg-surface-container-low border border-outline-variant rounded-xl flex items-center gap-md">
    <span class="material-symbols-outlined text-on-surface-variant">info</span>
    <p class="text-body-sm text-on-surface-variant flex-1">
      {{ 'dash.no_data_msg' | translate }}
      <a routerLink="/data-input" class="text-teal-600 font-semibold hover:underline">{{ 'nav.data_input' | translate }}</a>.
    </p>
  </div>

  <!-- KPI Metrics -->
  <div class="grid grid-cols-12 gap-gutter mb-xl">
    <div class="col-span-12 md:col-span-4">
      <app-metric-card
        [title]="'dash.metric.total_vessels' | translate"
        [value]="totalVessels"
        [trend]="hasData ? ('dash.metric.trend_data' | translate) : ('dash.metric.upload_prompt' | translate)"
        trendIcon="directions_boat"
        trendClass="text-teal-600"
        icon="directions_boat"
        iconBgClass="bg-primary-container">
      </app-metric-card>
    </div>

    <div class="col-span-12 md:col-span-4">
      <app-metric-card
        [title]="'dash.metric.active_berths' | translate"
        [value]="uniqueBerths"
        [trend]="hasData ? ('dash.metric.berth_ids' | translate) : ('dash.metric.upload_prompt' | translate)"
        trendIcon="dock"
        trendClass="text-teal-600"
        icon="dock"
        iconBgClass="bg-on-secondary-container">
      </app-metric-card>
    </div>

    <div class="col-span-12 md:col-span-4">
      <app-metric-card
        [title]="'dash.metric.avg_duration' | translate"
        [value]="avgDuration"
        [trend]="hasData ? ('dash.metric.per_call' | translate) : ('dash.metric.upload_prompt' | translate)"
        trendIcon="timer"
        [trendClass]="skippedRows !== '0' && hasData ? 'text-amber-500' : 'text-teal-600'"
        icon="timer"
        iconBgClass="bg-primary-container">
      </app-metric-card>
    </div>
  </div>

  <!-- Berth Timeline -->
  <div class="mb-xl">
    <app-berth-timeline></app-berth-timeline>
  </div>

  <!-- Terminal Map -->
  <div>
    <app-terminal-map></app-terminal-map>
  </div>

  <!-- FAB -->
  <div class="fixed bottom-margin right-margin flex flex-col items-end gap-md z-30">
    <button type="button" class="flex items-center gap-md bg-on-secondary-container text-white px-lg py-md rounded-full shadow-2xl hover:opacity-90 active:scale-95 transition-all">
      <span class="material-symbols-outlined">add</span>
      <span class="text-label-md">{{ 'dash.fab' | translate }}</span>
    </button>
  </div>
</div>
